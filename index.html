<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Paint X</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #121214;
            color: #e0e0e6;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Верхня панель (Налаштування полотна) */
        .top-bar {
            height: 50px;
            background: #1c1c1e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid #2c2c2e;
            z-index: 10;
        }
        .logo {
            font-weight: bold;
            font-size: 18px;
            color: #3498db;
            letter-spacing: 0.5px;
        }
        .canvas-select-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        select, button {
            background: #2c2c2e;
            color: #fff;
            border: 1px solid #3a3a3c;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }
        select:hover, button:hover {
            background: #3a3a3c;
        }
        button.active {
            background: #3498db;
            border-color: #54b4f3;
        }

        /* Головна робоча зона */
        .main-container {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        /* Ліва панель інструментів (як в ibis) */
        .left-bar {
            width: 60px;
            background: #1c1c1e;
            border-right: 1px solid #2c2c2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 0;
            gap: 15px;
            z-index: 10;
        }
        .tool-btn {
            width: 42px;
            height: 42px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: transparent;
            border: none;
            color: #a0a0a5;
        }
        .tool-btn:hover {
            background: #2c2c2e;
            color: #fff;
        }
        .tool-btn.active {
            background: #3498db;
            color: white;
        }

        /* Робоче поле для полотна */
        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #242426;
            padding: 20px;
            overflow: auto;
        }
        canvas {
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: block;
            cursor: crosshair;
        }

        /* Нижня панель керування властивостями пензля */
        .bottom-bar {
            height: 60px;
            background: #1c1c1e;
            border-top: 1px solid #2c2c2e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 0 20px;
            z-index: 10;
        }
        .prop-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }
        input[type="range"] {
            accent-color: #3498db;
            background: #3a3a3c;
            height: 4px;
            border-radius: 2px;
            cursor: pointer;
        }
        .color-preview {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid #fff;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .color-preview input[type="color"] {
            position: absolute;
            top: -5px;
            left: -5px;
            width: 40px;
            height: 40px;
            opacity: 0;
            cursor: pointer;
        }

        /* Модальне вікно ГАЛЕРЕЇ проектів */
        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 12, 0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            padding: 30px;
            overflow-y: auto;
        }
        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #2c2c2e;
            padding-bottom: 15px;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }
        .project-card {
            background: #1c1c1e;
            border: 1px solid #2c2c2e;
            border-radius: 10px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .project-card img {
            width: 100%;
            height: 140px;
            object-fit: contain;
            background: #fff;
            border-radius: 6px;
        }
        .project-actions {
            display: flex;
            gap: 8px;
        }
        .project-actions button {
            flex: 1;
            padding: 6px;
            font-size: 11px;
        }
        .btn-delete { background: #e74c3c; border-color: #c0392b; }
        .btn-delete:hover { background: #c0392b; }
        .btn-download { background: #2ecc71; border-color: #27ae60; }
        .btn-download:hover { background: #27ae60; }
    </style>
</head>
<body>

    <!-- ВЕРХНЯ ПАНЕЛЬ -->
    <div class="top-bar">
        <div class="logo">Studio Paint X</div>
        <div class="canvas-select-group">
            <label for="formatSelect">Формат:</label>
            <select id="formatSelect">
                <option value="1:1">1:1 (Квадрат 600x600)</option>
                <option value="16:9">16:9 (HD 800x450)</option>
                <option value="3:4">3:4 (Книга 450x600)</option>
            </select>
            <button id="saveProjectBtn">Зберегти в гру</button>
            <button id="openGalleryBtn" style="background: #3498db;">Моя Галерея</button>
        </div>
    </div>

    <!-- ГОЛОВНА ЗОНА -->
    <div class="main-container">
        
        <!-- ЛІВА ПАНЕЛЬ ІНСТРУМЕНТІВ -->
        <div class="left-bar">
            <!-- Олівець -->
            <button class="tool-btn active" id="tool-pencil" title="Олівець">✏️</button>
            <!-- Маркер -->
            <button class="tool-btn" id="tool-marker" title="Маркер">🖊️</button>
            <!-- Ластик -->
            <button class="tool-btn" id="tool-eraser" title="Ластик">🧽</button>
            <hr style="width: 60%; border-color: #2c2c2e; margin: 5px 0;">
            <!-- Очистити все полотно -->
            <button class="tool-btn" id="clearCanvasBtn" title="Очистити все">🗑️</button>
        </div>

        <!-- РОБОЧЕ ПОЛЕ -->
        <div class="canvas-area">
            <canvas id="paintCanvas"></canvas>
        </div>
    </div>

    <!-- НИЖНЯ ПАНЕЛЬ ВЛАСТИВОСТЕЙ -->
    <div class="bottom-bar">
        <div class="prop-group">
            <span id="toolLabel">Пензель: Олівець</span>
        </div>
        
        <div class="prop-group">
            <label>Товщина:</label>
            <input type="range" id="brushSize" min="1" max="50" value="4">
            <span id="sizeValue" style="width: 20px;">4px</span>
        </div>

        <div class="prop-group" id="colorGroup">
            <label>Колір:</label>
            <div class="color-preview" id="colorPreview" style="background: #000000;">
                <input type="color" id="colorPicker" value="#000000">
            </div>
        </div>
    </div>

    <!-- ВЕБ-ГАЛЕРЕЯ (МОДАЛЬНЕ ВІКНО) -->
    <div class="gallery-overlay" id="galleryOverlay">
        <div class="gallery-header">
            <h2>Внутрішня Галерея Проектів</h2>
            <button id="closeGalleryBtn" style="background: #e74c3c; padding: 8px 20px; font-size: 14px;">Назад до малювання</button>
        </div>
        <div class="gallery-grid" id="galleryGrid">
            <!-- Сюди скрипт рендеритиме збережені малюнки -->
        </div>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');

        // Елементи інтерфейсу
        const formatSelect = document.getElementById('formatSelect');
        const brushSize = document.getElementById('brushSize');
        const sizeValue = document.getElementById('sizeValue');
        const colorPicker = document.getElementById('colorPicker');
        const colorPreview = document.getElementById('colorPreview');
        const toolLabel = document.getElementById('toolLabel');
        const clearCanvasBtn = document.getElementById('clearCanvasBtn');
        
        // Кнопки інструментів
        const toolPencil = document.getElementById('tool-pencil');
        const toolMarker = document.getElementById('tool-marker');
        const toolEraser = document.getElementById('tool-eraser');

        // Галерея
        const saveProjectBtn = document.getElementById('saveProjectBtn');
        const openGalleryBtn = document.getElementById('openGalleryBtn');
        const closeGalleryBtn = document.getElementById('closeGalleryBtn');
        const galleryOverlay = document.getElementById('galleryOverlay');
        const galleryGrid = document.getElementById('galleryGrid');

        // Стан програми
        let isDrawing = false;
        let currentTool = 'pencil'; // pencil, marker, eraser
        let savedColor = '#000000';

        // Налаштування розмірів форматів
        const formats = {
            '1:1': { width: 600, height: 600 },
            '16:9': { width: 800, height: 450 },
            '3:4': { width: 450, height: 600 }
        };

        // Функція зміни формату листка
        function initCanvas() {
            const selectedFormat = formatSelect.value;
            canvas.width = formats[selectedFormat].width;
            canvas.height = formats[selectedFormat].height;
            
            // Заливка фону білим (щоб при збереженні не було прозорості)
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Скидання налаштувань пензля після зміни розміру
            applyToolSettings();
        }

        // Логіка інструментів (олівець, маркер, ластик)
        function applyToolSettings() {
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            if (currentTool === 'pencil') {
                ctx.globalAlpha = 0.9; // Олівець злегка текстурований
                ctx.strokeStyle = savedColor;
                toolLabel.textContent = "Пензель: Олівець";
            } else if (currentTool === 'marker') {
                ctx.globalAlpha = 0.4; // Маркер напівпрозорий, шарується
                ctx.strokeStyle = savedColor;
                toolLabel.textContent = "Пензель: Маркер";
            } else if (currentTool === 'eraser') {
                ctx.globalAlpha = 1.0;
                ctx.strokeStyle = '#ffffff'; // Стирає білим
                toolLabel.textContent = "Інструмент: Ластик";
            }
        }

        // Перемикання кнопок інструментів
        function setActiveTool(button, toolName) {
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            currentTool = toolName;
            applyToolSettings();
        }

        toolPencil.addEventListener('click', () => setActiveTool(toolPencil, 'pencil'));
        toolMarker.addEventListener('click', () => setActiveTool(toolMarker, 'marker'));
        toolEraser.addEventListener('click', () => setActiveTool(toolEraser, 'eraser'));

        // Зміна кольору
        colorPicker.addEventListener('input', (e) => {
            savedColor = e.target.value;
            colorPreview.style.background = savedColor;
            if (currentTool !== 'eraser') ctx.strokeStyle = savedColor;
        });

        // Зміна розміру
        brushSize.addEventListener('input', (e) => {
            sizeValue.textContent = e.target.value + 'px';
        });

        // Формат
        formatSelect.addEventListener('change', () => {
            if(confirm("Зміна формату очистить поточний малюнок. Продовжити?")) {
                initCanvas();
            }
        });

        // Очищення полотна
        clearCanvasBtn.addEventListener('click', () => {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        });

        // --- ЛОГІКА МАЛЮВАННЯ ---
        function startDrawing(e) {
            isDrawing = true;
            draw(e);
        }

        function draw(e) {
            if (!isDrawing) return;

            ctx.lineWidth = brushSize.value;
            applyToolSettings(); // Оновлюємо альфу та колір перед кожним штрихом

            const rect = canvas.getBoundingClientRect();
            // Рахуємо масштаб, якщо canvas стиснутий стилями
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function stopDrawing() {
            isDrawing = false;
            ctx.beginPath();
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);


        // --- СИСТЕМА ГАЛЕРЕЇ (LOCALSTORAGE) ---

        // Збереження в ігрову галерею
        saveProjectBtn.addEventListener('click', () => {
            const dataURL = canvas.toDataURL('image/png');
            let projects = JSON.parse(localStorage.getItem('studio_paint_projects')) || [];
            
            projects.push({
                id: Date.now(),
                image: dataURL,
                date: new Date().toLocaleTimeString() + " " + new Date().toLocaleDateString()
            });

            localStorage.setItem('studio_paint_projects', JSON.stringify(projects));
            alert("Проект успішно збережено у внутрішню галерею!");
        });

        // Відкрити галерею
        openGalleryBtn.addEventListener('click', () => {
            galleryOverlay.style.display = 'flex';
            renderGallery();
        });

        // Закрити галерею
        closeGalleryBtn.addEventListener('click', () => {
            galleryOverlay.style.display = 'none';
        });

        // Відображення карток у галереї
        function renderGallery() {
            galleryGrid.innerHTML = '';
            let projects = JSON.parse(localStorage.getItem('studio_paint_projects')) || [];

            if (projects.length === 0) {
                galleryGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #aaa;">У галереї ще немає збережених проектів.</p>';
                return;
            }

            projects.forEach(proj => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `
                    <img src="${proj.image}" alt="Скетч">
                    <div style="font-size: 11px; color: #888; text-align: center;">${proj.date}</div>
                    <div class="project-actions">
                        <button class="btn-download" onclick="downloadImage('${proj.image}', ${proj.id})">Завантажити в тел/ПК</button>
                        <button class="btn-delete" onclick="deleteProject(${proj.id})">Видалити</button>
                    </div>
                `;
                galleryGrid.appendChild(card);
            });
        }

        // Завантаження картинки безпосередньо в галерею пристрою
        window.downloadImage = function(dataURL, id) {
            const a = document.createElement('a');
            a.href = dataURL;
            a.download = `studio_art_${id}.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        // Видалення проекту з внутрішньої галереї
        window.deleteProject = function(id) {
            if (confirm("Ти дійсно хочеш видалити цей проект з пам'яті гри?")) {
                let projects = JSON.parse(localStorage.getItem('studio_paint_projects')) || [];
                projects = projects.filter(p => p.id !== id);
                localStorage.setItem('studio_paint_projects', JSON.stringify(projects));
                renderGallery();
            }
        };

        // Старт програми
        initCanvas();
    </script>
</body>
  </html>
